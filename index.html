<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANAGEMENT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico">
</head>
<body>
    <div class="crud">
        <div class="head">
            <h1>MANAGEMENT</h1>
            <p>E-Commerce Management system</p>
        </div>
        <div class="inputs">
            <input placeholder="title" type="text" id="title">
            <div class="price">
                <input onkeyup="getTotal()"type="number" id="price" min="0" placeholder="price">
                <input onkeyup="getTotal()" type="number" id="taxes" min="0" placeholder="taxes">
                <input onkeyup="getTotal()" type="number" id="shipping" min="0" placeholder="shipping">
                <input onkeyup="getTotal()" type="number" id="discount" min="0" placeholder="discount">
                <small id="total">00</small>
            </div>
            <input placeholder="count" type="number" id="count">
            <input placeholder="category" type="text" id="category">
            <input type="file" id="img" accept="image/*">
            <button id="submit">Create</button>
        </div>
        <div class="outputs">
        <div class="searchBlock">
            <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="search">
            <div class="btnSearch">
                <button onclick="getSearchMood(this.id)" id="searchTitle">Search By Title</button>
                <button onclick="getSearchMood(this.id)" id="searchCategory">Search By Category</button>
            </div>
        </div>
        <div id="deleteAll">
            
        </div>
        <div>
        <table class="table">
            <thead>
            <tr>
                <th>id</th>
                <th>title</th>
                <th>price</th>
                <th>taxes</th>
                <th>ads</th>
                <th>discount</th>
                <th>total</th>
                <th>category</th>
                <th>imges<img src="" alt=""></th>
                <th>update</th>
                <th>delete</th>
            </tr>
            </thead>

            <tbody id="tbody">
                
            </tbody>

        </table>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
